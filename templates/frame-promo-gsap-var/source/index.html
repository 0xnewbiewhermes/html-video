<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>GSAP Promo — Variable-Aware</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0b0e;color:#f5f5f7;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.bg-layer{position:absolute;inset:0;overflow:hidden;z-index:0}
.bg-layer .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4}
.bg-layer .orb.o1{width:500px;height:500px;background:#7c3aed;top:-100px;left:-100px}
.bg-layer .orb.o2{width:400px;height:400px;background:#06b6d4;bottom:-80px;right:-80px;opacity:0.3}
.bg-layer .orb.o3{width:300px;height:300px;background:#ec4899;top:50%;left:50%;opacity:0.2}
.grid-overlay{position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:64px 64px}
.card{position:relative;z-index:2;text-align:center;max-width:1000px;padding:2rem}
.headline{font-size:clamp(48px,8vw,120px);font-weight:900;line-height:1.05;letter-spacing:-0.03em;margin-bottom:1rem;opacity:0;transform:translateY(40px)}
.headline .gradient{background:linear-gradient(135deg,#a78bfa,#06b6d4,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subheadline{font-size:clamp(18px,2.5vw,32px);color:#a0aec0;font-weight:400;margin-bottom:2rem;opacity:0;transform:translateY(30px)}
.cta{display:inline-block;padding:14px 36px;border-radius:999px;font-weight:600;font-size:clamp(14px,1.2vw,18px);letter-spacing:0.02em;cursor:default;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;box-shadow:0 4px 24px rgba(124,58,237,0.3);opacity:0;transform:translateY(20px)}
.chip{position:absolute;top:24px;left:32px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#848d97;font-family:monospace;opacity:0}
.footer-chip{position:absolute;bottom:24px;right:32px;font-size:10px;letter-spacing:0.1em;color:#5a5f66;font-family:monospace;opacity:0}
@media(prefers-reduced-motion:reduce){.headline,.subheadline,.cta{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="bg-layer">
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
</div>
<div class="grid-overlay"></div>

<div class="chip" data-var="chip">html-video · GSAP PROMO</div>

<div class="card">
<div class="headline"><span class="gradient" data-var="headline">GSAP<br/>Animation</span></div>
<div class="subheadline" data-var="subheadline">Multi-layer animated promo with staggered entrance</div>
<div class="cta" data-var="cta">↳ Learn More</div>
</div>

<div class="footer-chip" data-var="footer">html-video · fork by 0xnewbiewhermes</div>

<script>
/* GSAP Animation Timeline — starts on load */
(function() {
  var tl = gsap.timeline({paused: true});

  tl.to('.chip', {opacity:0.6, y:0, duration:0.4, ease:'power2.out'})
    .to('.headline', {opacity:1, y:0, duration:0.8, ease:'power3.out'}, '+=0.1')
    .to('.subheadline', {opacity:0.8, y:0, duration:0.6, ease:'power2.out'}, '-=0.3')
    .to('.cta', {opacity:1, y:0, duration:0.5, ease:'back.out(1.7)'}, '-=0.2')
    .to('.footer-chip', {opacity:0.4, duration:0.3}, '+=0.3');

  window.__hvTimeline = tl;
  window.__hvPlayAll = function() { tl.play(0); };

  /* Auto-play if hvPlayAll never gets called (standalone / test) */
  setTimeout(function() {
    if (!window.__hvPlayed) window.__hvPlayAll();
  }, 300);
})();

/* Variable renderer — reads __HV_VARS__ injected by adapter */
setTimeout(function() {
  var vars = {};
  try { vars = window.__HV_VARS__ || {}; } catch(e) {}
  var els = document.querySelectorAll('[data-var]');
  for (var i = 0, el; i < els.length; i++) {
    el = els[i];
    var key = el.getAttribute('data-var');
    var val = vars[key];
    if (val && typeof val === 'string') {
      if (val.indexOf('\n') !== -1) {
        el.innerHTML = '';
        var parts = val.split('\n');
        for (var p = 0; p < parts.length; p++) {
          if (p > 0) el.appendChild(document.createElement('br'));
          el.appendChild(document.createTextNode(parts[p]));
        }
      } else {
        el.textContent = val;
      }
    }
  }
  var dur = vars.duration_sec || 6;
  document.documentElement.style.setProperty('--hv-duration', dur + 's');
}, 50);
</script>
</body>
</html>
